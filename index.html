<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
  content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Q4 Seatwork 1</title>

  <style>

  .text{
    text-align: left;
    color: antiquewhite;

  }
  body{
    background: rgb(115, 98, 98);
    height: 600px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #box{
    background: rgb(140, 125, 125);
    padding: 30px;
    border-radius: 25px;
    width: 400px;
  }

  .form-control{
    border-radius: 10px;
    text-align: center;
  }
  .btn {
    padding: 10px 20px;
    font-size: 16px;
    width: 150px;
  }

  .btn:hover{
    padding: 10.5px 20.5px;
    font-size: 16.5px;
  }

  .smallbutton {
    padding: 4px 8px;
    font-size: 14px;
    background: rgb(158, 135, 135);
    color: rgb(0, 0, 0);
    border: none;
  }

  .smallbutton:hover{
    background:  rgb(158, 135, 135);
    padding: 4.5px 8.5px;
    font-size: 15px;
  }

  .instructions {
    display: none;
    color: antiquewhite;
  }

  h6{
    color: antiquewhite
    ;
  }


  </style>
</head>
<body>
  
<div class="text-center" id="box">

    <h1>Log In</h1>

    <button class="btn smallbutton mb-2" onclick="show()">
      Show Instructions
    </button>

    <p class="instructions" id="instructions">
      Username: hacker <br>
      Password : Password
    </p>

    <h6>Username</h6>
    <input type="text" id="user" class="form-control mb-3" placeholder="Enter Username">

    <h6>Password</h6>
    <input type="password" id="pass" class="form-control mb-3" placeholder="********">

    <div class="text mb-3">
      <input type="checkbox" class="stay"> Stay logged in
      <p>Your session will stay active on this advice.</p>
    </div>

    <button class="btn btn-primary" onclick="login()">Login</button>
    <button class="btn btn-light" onclick="cancel()">Cancel</button>

    <p id="output" class="mt-3"></p>
</div>

<script>

    let correctuser = "hacker";
    let correctpass = "Password";

    function show(){
      let instructions = document.getElementById("instructions");

      if (instructions.style.display === "none") {
        instructions.style.display = "block";
    } else {
        instructions.style.display = "none";
    }
  }

    function login(){
      let user = document.getElementById("user").value;
      let pass = document.getElementById("pass").value;

      if (user === correctuser && pass === correctpass){
        document.getElementById("output").innerHTML = "Login Succesful!";
        alert("Welcome back!")
      }

      else{
        document.getElementById("output").innerHTML = "Invalid username or password! Try again."
      }
    }

    function cancel() {
      document.getElementById("user").value = "";
      document.getElementById("pass").value = "";
      document.getElementById("output").innerHTML = "";
    }
</script>

</body>
</html>
